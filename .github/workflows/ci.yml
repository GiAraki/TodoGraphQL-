name: CI/CD TodoGraphQL

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restaurar dependências
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Publicar
        run: dotnet publish --no-restore --configuration Release -o ./publish
        env:
          MongoDB__ConnectionString: ${{ secrets.MONGODB_CONNECTION_STRING }}
          MongoDB__DatabaseName: tododb
          Jwt__Secret: ${{ secrets.JWT_SECRET }}
          Jwt__Issuer: ${{ secrets.JWT_ISSUER }}
          Jwt__Audience: ${{ secrets.JWT_AUDIENCE }}